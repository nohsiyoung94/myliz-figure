# HTTP → HTTPS 리다이렉트 + certbot 인증
server {
    listen 80;
    server_name myliz.co.kr www.myliz.co.kr admin.myliz.co.kr api.myliz.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 홈페이지 - myliz.co.kr
server {
    listen 443 ssl;
    http2 on;
    server_name myliz.co.kr www.myliz.co.kr;

    ssl_certificate /etc/letsencrypt/live/myliz.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myliz.co.kr/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

