# API - api.myliz.co.kr
server {
    listen 443 ssl;
    http2 on;
    server_name api.myliz.co.kr;

    ssl_certificate /etc/letsencrypt/live/myliz.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myliz.co.kr/privkey.pem;
